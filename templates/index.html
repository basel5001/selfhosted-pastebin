<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastebin — New Paste</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
            --accent-hover: #79c0ff; --danger: #f85149; --success: #3fb950;
        }
        body {
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column;
        }
        header {
            border-bottom: 1px solid var(--border); padding: 1rem 2rem;
            display: flex; align-items: center; justify-content: space-between;
        }
        header h1 { font-size: 1.25rem; font-weight: 600; }
        header h1 a { color: var(--text); text-decoration: none; }
        header h1 span { color: var(--accent); }
        main { flex: 1; padding: 2rem; max-width: 960px; margin: 0 auto; width: 100%; }
        .editor-wrap {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem;
        }
        .editor-header {
            padding: 0.5rem 1rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.8rem; color: var(--text-muted);
        }
        .editor-body { display: flex; min-height: 300px; }
        .line-numbers {
            padding: 1rem 0.75rem; text-align: right; user-select: none;
            color: var(--text-muted); font-size: 0.85rem; line-height: 1.5;
            border-right: 1px solid var(--border); min-width: 3rem;
            background: var(--surface);
        }
        textarea {
            flex: 1; padding: 1rem; background: transparent; border: none;
            color: var(--text); font-family: inherit; font-size: 0.85rem;
            line-height: 1.5; resize: vertical; outline: none; min-height: 300px;
            tab-size: 4;
        }
        .controls {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
            margin-bottom: 1.5rem;
        }
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem; }
        select, input[type="password"], input[type="text"] {
            width: 100%; padding: 0.6rem 0.75rem; background: var(--surface);
            border: 1px solid var(--border); border-radius: 6px; color: var(--text);
            font-family: inherit; font-size: 0.85rem; outline: none;
        }
        select:focus, input:focus { border-color: var(--accent); }
        .checkbox-row {
            display: flex; align-items: center; gap: 0.5rem;
            grid-column: 1 / -1; margin-top: 0.25rem;
        }
        .checkbox-row input[type="checkbox"] {
            accent-color: var(--accent); width: 16px; height: 16px;
        }
        .checkbox-row label { margin-bottom: 0; font-size: 0.85rem; color: var(--text); }
        .actions { display: flex; gap: 1rem; }
        button {
            padding: 0.7rem 1.5rem; border: none; border-radius: 6px;
            font-family: inherit; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: background 0.15s;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary {
            background: var(--surface); color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { border-color: var(--text-muted); }
        .status {
            margin-top: 1rem; padding: 0.75rem 1rem; border-radius: 6px;
            font-size: 0.85rem; display: none;
        }
        .status.error { display: block; background: #f8514922; border: 1px solid var(--danger); color: var(--danger); }
        .status.success { display: block; background: #3fb95022; border: 1px solid var(--success); color: var(--success); }
        .status a { color: inherit; font-weight: 600; }
        footer {
            text-align: center; padding: 1rem; color: var(--text-muted);
            font-size: 0.75rem; border-top: 1px solid var(--border);
        }
        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/"><span>&gt;_</span> pastebin</a></h1>
    </header>

    <main>
        <form id="pasteForm">
            <div class="editor-wrap">
                <div class="editor-header">
                    <span>new paste</span>
                </div>
                <div class="editor-body">
                    <div class="line-numbers" id="lineNumbers">1</div>
                    <textarea id="content" placeholder="Paste your code here..." spellcheck="false"></textarea>
                </div>
            </div>

            <div class="controls">
                <div>
                    <label for="language">Language</label>
                    <select id="language">
                        <option value="plain">Plain Text</option>
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="bash">Bash</option>
                        <option value="json">JSON</option>
                        <option value="yaml">YAML</option>
                        <option value="sql">SQL</option>
                        <option value="go">Go</option>
                        <option value="rust">Rust</option>
                    </select>
                </div>
                <div>
                    <label for="expiry">Expires In</label>
                    <select id="expiry">
                        <option value="1h">1 Hour</option>
                        <option value="1d" selected>1 Day</option>
                        <option value="1w">1 Week</option>
                        <option value="1m">1 Month</option>
                        <option value="never">Never</option>
                    </select>
                </div>
                <div>
                    <label for="password">Password (optional)</label>
                    <input type="password" id="password" placeholder="Leave empty for no password">
                </div>
                <div></div>
                <div class="checkbox-row">
                    <input type="checkbox" id="burnAfterRead">
                    <label for="burnAfterRead">Burn after reading (self-destructs after first view)</label>
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="btn-primary" id="submitBtn">Create Paste</button>
                <button type="button" class="btn-secondary" onclick="document.getElementById('content').value='';updateLines();">Clear</button>
            </div>
        </form>

        <div class="status" id="status"></div>
    </main>

    <footer>
        <a href="https://github.com/basel5001/selfhosted-pastebin">selfhosted-pastebin</a>
        &mdash; zero-knowledge encrypted pastes
    </footer>

    <script>
        // --- Line numbers ---
        const textarea = document.getElementById('content');
        const lineNumbers = document.getElementById('lineNumbers');

        function updateLines() {
            const lines = textarea.value.split('\n').length;
            lineNumbers.textContent = Array.from({length: lines}, (_, i) => i + 1).join('\n');
        }
        textarea.addEventListener('input', updateLines);
        textarea.addEventListener('scroll', () => { lineNumbers.scrollTop = textarea.scrollTop; });

        // --- AES-GCM Encryption (Web Crypto API) ---
        async function generateKey() {
            return crypto.subtle.generateKey(
                { name: 'AES-GCM', length: 256 },
                true,
                ['encrypt', 'decrypt']
            );
        }

        async function exportKey(key) {
            const raw = await crypto.subtle.exportKey('raw', key);
            return btoa(String.fromCharCode(...new Uint8Array(raw)))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        async function encryptContent(plaintext, key) {
            const encoder = new TextEncoder();
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt(
                { name: 'AES-GCM', iv },
                key,
                encoder.encode(plaintext)
            );
            // Combine IV + ciphertext, then base64
            const combined = new Uint8Array(iv.length + encrypted.byteLength);
            combined.set(iv);
            combined.set(new Uint8Array(encrypted), iv.length);
            return btoa(String.fromCharCode(...combined));
        }

        // --- Form submission ---
        document.getElementById('pasteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusEl = document.getElementById('status');
            const submitBtn = document.getElementById('submitBtn');
            const content = textarea.value.trim();

            if (!content) {
                statusEl.className = 'status error';
                statusEl.textContent = 'Please enter some content.';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Encrypting...';
            statusEl.className = 'status';
            statusEl.style.display = 'none';

            try {
                // Generate encryption key
                const key = await generateKey();
                const keyStr = await exportKey(key);

                // Encrypt content client-side
                const encrypted = await encryptContent(content, key);

                // Send to server
                const body = {
                    content: encrypted,
                    language: document.getElementById('language').value,
                    expires_in: document.getElementById('expiry').value,
                    burn_after_read: document.getElementById('burnAfterRead').checked,
                };

                const password = document.getElementById('password').value;
                if (password) body.password = password;

                const res = await fetch('/api/paste', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to create paste');
                }

                const data = await res.json();
                const url = `${window.location.origin}/${data.id}#${keyStr}`;

                statusEl.className = 'status success';
                statusEl.innerHTML = `Paste created! <a href="${url}">${url}</a>`;

            } catch (err) {
                statusEl.className = 'status error';
                statusEl.textContent = err.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Paste';
            }
        });
    </script>
</body>
</html>
